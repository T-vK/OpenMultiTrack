name: Android SDK setup
description: JDK 17, Android SDK, NDK, and Oboe submodule for OpenMultiTrack
runs:
  using: composite
  steps:
    - name: Init submodules
      shell: bash
      run: git submodule update --init --recursive

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: "17"
        cache: gradle

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Accept SDK licenses
      shell: bash
      run: |
        set +o pipefail
        for _ in $(seq 1 100); do echo y; done | sdkmanager --licenses >/dev/null 2>&1 || true
        set -o pipefail

    - name: Install SDK components
      shell: bash
      run: |
        sdkmanager \
          "platform-tools" \
          "platforms;android-35" \
          "build-tools;35.0.0" \
          "ndk;26.3.11579264" \
          "cmake;3.22.1"

    - name: Gradle wrapper executable
      shell: bash
      run: chmod +x gradlew
