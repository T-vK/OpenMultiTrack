name: Android SDK setup
description: JDK 17, cached Android SDK/NDK, Gradle build cache, and native build caches
inputs:
  init-submodules:
    description: Run git submodule update (skip when checkout already used submodules recursive)
    required: false
    default: "false"
  cache-native:
    description: Restore/save CMake/.cxx build cache
    required: false
    default: "true"
runs:
  using: composite
  steps:
    - name: Init submodules
      if: inputs.init-submodules == 'true'
      shell: bash
      run: git submodule update --init --recursive

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: "17"

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        cache-read-only: false
        gradle-home-cache-cleanup: true
        add-job-summary: never
        validate-wrappers: false
        dependency-graph: disabled
        gradle-home-cache-excludes: |
          caches/transforms-*
          caches/*/transforms-*
          .tmp

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Cache Android SDK packages
      id: android-sdk-cache
      uses: actions/cache@v4
      with:
        path: |
          /usr/local/lib/android/sdk/ndk
          /usr/local/lib/android/sdk/cmake
          /usr/local/lib/android/sdk/platforms
          /usr/local/lib/android/sdk/build-tools
          /usr/local/lib/android/sdk/platform-tools
        key: android-sdk-${{ runner.os }}-api35-ndk26.3-bt35-v2
        restore-keys: |
          android-sdk-${{ runner.os }}-api35-ndk26.3-bt35-v2
          android-sdk-${{ runner.os }}-

    - name: Accept SDK licenses
      if: steps.android-sdk-cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set +o pipefail
        for _ in $(seq 1 100); do echo y; done | sdkmanager --licenses >/dev/null 2>&1 || true
        set -o pipefail

    - name: Install SDK components
      if: steps.android-sdk-cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        sdkmanager \
          "platform-tools" \
          "platforms;android-35" \
          "build-tools;35.0.0" \
          "ndk;26.3.11579264" \
          "cmake;3.22.1"

    - name: Cache native build outputs
      if: inputs.cache-native == 'true'
      uses: actions/cache@v4
      with:
        path: |
          audio-engine/.cxx
          audio-engine/build/intermediates/cxx
        key: native-${{ runner.os }}-${{ hashFiles('audio-engine/src/main/cpp/**', 'audio-engine/build.gradle.kts', 'third_party/oboe/include/**', 'gradle/libs.versions.toml') }}
        restore-keys: |
          native-${{ runner.os }}-

    - name: Verify pinned debug signing keystore
      shell: bash
      run: |
        chmod +x scripts/*.sh
        test -f keystore/debug.keystore
        ./scripts/apk-signer-fingerprint.sh >/dev/null

    - name: Gradle wrapper executable
      shell: bash
      run: chmod +x gradlew
