name: Android SDK setup
description: JDK 17, cached Android SDK/NDK, Gradle, and native build caches
inputs:
  cache-native:
    description: Restore/save CMake/.cxx build cache
    required: false
    default: "true"
runs:
  using: composite
  steps:
    - name: Init submodules
      shell: bash
      run: git submodule update --init --recursive

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
        restore-keys: |
          gradle-${{ runner.os }}-

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: "17"
        cache: gradle

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Cache Android SDK packages
      id: android-sdk-cache
      uses: actions/cache@v4
      with:
        path: |
          /usr/local/lib/android/sdk/ndk
          /usr/local/lib/android/sdk/cmake
          /usr/local/lib/android/sdk/platforms
          /usr/local/lib/android/sdk/build-tools
          /usr/local/lib/android/sdk/platform-tools
        key: android-sdk-${{ runner.os }}-api35-ndk26.3-bt35
        restore-keys: |
          android-sdk-${{ runner.os }}-

    - name: Accept SDK licenses
      if: steps.android-sdk-cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set +o pipefail
        for _ in $(seq 1 100); do echo y; done | sdkmanager --licenses >/dev/null 2>&1 || true
        set -o pipefail

    - name: Install SDK components
      if: steps.android-sdk-cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        sdkmanager \
          "platform-tools" \
          "platforms;android-35" \
          "build-tools;35.0.0" \
          "ndk;26.3.11579264" \
          "cmake;3.22.1"

    - name: Cache native build outputs
      if: inputs.cache-native == 'true'
      uses: actions/cache@v4
      with:
        path: |
          audio-engine/.cxx
          **/build/intermediates/cxx
        key: cxx-${{ runner.os }}-${{ hashFiles('audio-engine/src/main/cpp/**', 'third_party/oboe/include/**', 'gradle/libs.versions.toml') }}
        restore-keys: |
          cxx-${{ runner.os }}-

    - name: Gradle wrapper executable
      shell: bash
      run: chmod +x gradlew
