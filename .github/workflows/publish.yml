name: Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: publish-main
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    name: Build APK
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.semver.outputs.version }}
      tag: ${{ steps.semver.outputs.tag }}
      version_changed: ${{ steps.semver.outputs.version_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          fetch-tags: true

      - uses: ./.github/actions/android-setup

      - name: Compute semantic version
        id: semver
        shell: bash
        run: |
          chmod +x scripts/*.sh
          ./scripts/test-compute-semver.sh
          ./scripts/compute-semver.sh

      - name: Apply version to Gradle
        run: |
          ./scripts/write-version-properties.sh "${{ steps.semver.outputs.version }}"
          echo "Building OpenMultiTrack ${{ steps.semver.outputs.version }} (${{ steps.semver.outputs.tag }})"

      - name: Run tests and assemble debug APK
        run: |
          ./gradlew \
            :domain:test \
            :mixer-behringer:test \
            :session-io:test \
            :usb-audio:testDebugUnitTest \
            :app:assembleDebug \
            --build-cache \
            --parallel

      - name: Stage debug APK artifact
        run: |
          set -euo pipefail
          chmod +x scripts/*.sh
          VERSION="${{ steps.semver.outputs.version }}"
          APK="dist/org.openmultitrack_${VERSION}-debug.apk"
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk "$APK"
          export PATH="$ANDROID_HOME/build-tools/35.0.0:$PATH"
          ./scripts/verify-apk-signature.sh "$APK"
          sha256sum "$APK" | tee dist/SHA256SUMS

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: |
            dist/*.apk
            dist/SHA256SUMS
          retention-days: 30

  pages:
    name: F-Droid repo & GitHub Pages
    needs: build
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      FDROID_KEYSTORE_PASS: ${{ secrets.FDROID_KEYSTORE_PASS || 'openmultitrack-ci' }}
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            site
            fdroid
            fastlane
            scripts
            keystore

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements-fdroid.txt

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: release-apk
          path: dist/

      - name: Install fdroidserver
        run: pip install -r scripts/requirements-fdroid.txt

      - name: Restore F-Droid repo keystore
        uses: actions/cache@v4
        id: fdroid-keystore
        with:
          path: fdroid/keystore.p12
          key: fdroid-repo-keystore-v1

      - name: Generate repo keystore if missing
        if: steps.fdroid-keystore.outputs.cache-hit != 'true'
        run: |
          keytool -genkeypair -v \
            -keystore fdroid/keystore.p12 -storetype PKCS12 \
            -storepass "$FDROID_KEYSTORE_PASS" \
            -keypass "$FDROID_KEYSTORE_PASS" \
            -alias fdroidrepo -keyalg RSA -keysize 4096 -validity 10000 \
            -dname "CN=OpenMultiTrack Repo, OU=CI, O=OpenMultiTrack, C=DE"

      - name: Restore published F-Droid repo
        uses: actions/cache@v4
        with:
          path: |
            fdroid/repo
            site/fdroid/repo
          key: fdroid-repo-contents-v3
          restore-keys: |
            fdroid-repo-contents-v3

      - name: Build F-Droid repo and site
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/*.sh
          VERSION="${{ needs.build.outputs.version }}"
          mkdir -p site/fdroid/repo fdroid/repo
          touch site/.nojekyll
          cp dist/*.apk "fdroid/repo/org.openmultitrack_${VERSION}-debug.apk"
          export PATH="$HOME/.local/bin:$PATH"
          ./scripts/prepare-fdroid-config.sh
          ./scripts/prepare-fdroid-metadata.sh "$VERSION"
          ./scripts/prepare-fdroid-icons.sh "$VERSION"
          cd fdroid
          fdroid update --pretty
          ../scripts/verify-fdroid-index.sh repo/index-v1.json
          ../scripts/verify-fdroid-icons.sh repo/index-v1.json
          rsync -a repo/ ../site/fdroid/repo/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: needs.build.outputs.version_changed == 'true' && (github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip ci]'))
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: release-apk
          path: dist/

      - name: Commit version.properties bump
        run: |
          chmod +x scripts/*.sh
          ./scripts/write-version-properties.sh "${{ needs.build.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gradle/version.properties
          git diff --staged --quiet && exit 0
          git commit -m "chore(release): v${{ needs.build.outputs.version }} [skip ci]"
          git push

      - name: Push release tag
        run: |
          git tag -f "${{ needs.build.outputs.tag }}"
          git push origin "${{ needs.build.outputs.tag }}" --force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.tag }}
          name: OpenMultiTrack ${{ needs.build.outputs.version }}
          body: |
            Debug build only. The APK attached here is identical to the one in the
            [F-Droid repo](https://T-vK.github.io/OpenMultiTrack/fdroid/repo).

            If you installed a build from before signing was pinned (≤0.2.1), uninstall
            once, then install this version. Later updates will install in place.
          generate_release_notes: true
          files: |
            dist/*.apk
            dist/SHA256SUMS
          prerelease: false
